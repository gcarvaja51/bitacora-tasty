<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPX Backtester — Bitácora Tasty</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0f14; color:#e2e8f0; font-family:'Inter',system-ui,sans-serif; min-height:100vh; }
  
  .header { padding:20px 24px; border-bottom:1px solid #1e2433; display:flex; align-items:center; gap:12px; }
  .header h1 { font-size:18px; font-weight:600; color:#fff; }
  .header .badge { background:#1a2744; color:#60a5fa; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  
  .controls { padding:16px 24px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; border-bottom:1px solid #1e2433; }
  .ctrl-group { display:flex; align-items:center; gap:8px; }
  .ctrl-group label { font-size:12px; color:#94a3b8; }
  .ctrl-group input { background:#1e2433; border:1px solid #2d3748; color:#e2e8f0; padding:6px 10px; border-radius:6px; font-size:12px; }
  .btn-run { background:#3b82f6; color:#fff; border:none; padding:8px 20px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-run:hover { background:#2563eb; }
  .stat { background:#1e2433; border-radius:6px; padding:8px 14px; font-size:12px; color:#94a3b8; }
  .stat span { color:#fff; font-weight:600; margin-left:4px; }

  .main { display:grid; grid-template-columns:1fr 340px; height:calc(100vh - 120px); }
  
  .chart-area { padding:16px; overflow:hidden; border-right:1px solid #1e2433; }
  canvas { width:100%; }

  .panel { overflow-y:auto; }
  .panel-title { padding:14px 16px; font-size:12px; font-weight:700; color:#94a3b8; letter-spacing:.08em; text-transform:uppercase; border-bottom:1px solid #1e2433; }
  
  .signal-list { padding:8px; display:flex; flex-direction:column; gap:6px; }
  .signal-card { background:#1a1f2e; border:1px solid #2d3748; border-radius:8px; padding:12px; cursor:pointer; transition:all .15s; }
  .signal-card:hover { border-color:#3b82f6; background:#1e2844; }
  .signal-card.active { border-color:#3b82f6; background:#1e2844; box-shadow:0 0 0 1px #3b82f6; }
  .signal-card.bearish { border-left:3px solid #f87171; }
  .signal-card.bullish { border-left:3px solid #34d399; }
  
  .sc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .sc-dir { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; }
  .sc-dir.bear { background:#7f1d1d33; color:#f87171; }
  .sc-dir.bull { background:#14532d33; color:#34d399; }
  .sc-score { font-size:11px; color:#fbbf24; font-weight:700; }
  .sc-fecha { font-size:13px; font-weight:600; color:#e2e8f0; }
  .sc-hora { font-size:11px; color:#94a3b8; }
  .sc-price { font-size:12px; color:#94a3b8; margin-top:4px; }
  .sc-estrategia { font-size:12px; color:#60a5fa; font-weight:600; margin-top:2px; }

  .detail-panel { background:#111827; border-top:1px solid #1e2433; padding:16px; }
  .detail-panel h3 { font-size:13px; font-weight:700; color:#fff; margin-bottom:12px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .detail-item { background:#1e2433; border-radius:6px; padding:10px; }
  .detail-item .label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; }
  .detail-item .value { font-size:14px; font-weight:700; color:#e2e8f0; }
  .detail-item .value.green { color:#34d399; }
  .detail-item .value.red { color:#f87171; }
  .detail-item .value.yellow { color:#fbbf24; }
  .detail-item .value.blue { color:#60a5fa; }
  
  .playbook-bars { margin-top:12px; }
  .pb-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .pb-label { font-size:10px; color:#94a3b8; width:140px; flex-shrink:0; }
  .pb-bar-bg { flex:1; background:#1e2433; border-radius:3px; height:6px; }
  .pb-bar { height:6px; border-radius:3px; }
  .pb-pts { font-size:10px; color:#64748b; width:24px; text-align:right; }
  .no-signal { padding:24px 16px; text-align:center; color:#4b5563; font-size:13px; }

  .tooltip { position:absolute; background:#1e2433; border:1px solid #374151; border-radius:6px; padding:8px 12px; font-size:11px; color:#e2e8f0; pointer-events:none; z-index:100; display:none; }
</style>
</head>

  </div>
</div>

<div class="tooltip" id="tooltip"></div>

function resizeCanvas() {
  const area = canvas.parentElement;

  drawChart();
}

function drawChart(highlightIdx = null) {
  const W = canvas.width, H = canvas.height;
  ctx_c.clearRect(0,0,W,H);

  if (!chartData.length) return;

  const pad = { top:20, right:60, bottom:50, left:10 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top  - pad.bottom;

  const prices = chartData.map(c => [c.high, c.low]).flat().filter(Boolean);
  const minP = Math.min(...prices) - 20;
  const maxP = Math.max(...prices) + 20;

  const scaleX = i => pad.left + (i / (chartData.length-1)) * cw;
  const scaleY = p => pad.top  + (1 - (p-minP)/(maxP-minP)) * ch;

  // Fondo de grid
  ctx_c.strokeStyle = '#1e2433';
  ctx_c.lineWidth = 1;
  for (let i=0; i<=5; i++) {
    const y = pad.top + (ch/5)*i;
    ctx_c.beginPath(); ctx_c.moveTo(pad.left, y); ctx_c.lineTo(W-pad.right, y); ctx_c.stroke();
    const price = maxP - (maxP-minP)*(i/5);
    ctx_c.fillStyle = '#4b5563'; ctx_c.font = '10px Inter'; ctx_c.textAlign='left';
    ctx_c.fillText(price.toFixed(0), W-pad.right+4, y+4);
  }

  // EMA20
  ctx_c.beginPath(); ctx_c.strokeStyle='#f59e0b33'; ctx_c.lineWidth=1;
  chartData.forEach((c,i) => {
    if (!c.ema20) return;
    i===0 ? ctx_c.moveTo(scaleX(i), scaleY(c.ema20)) : ctx_c.lineTo(scaleX(i), scaleY(c.ema20));
  });
  ctx_c.stroke();

  // EMA10
  ctx_c.beginPath(); ctx_c.strokeStyle='#60a5fa44'; ctx_c.lineWidth=1;
  chartData.forEach((c,i) => {
    if (!c.ema10) return;
    i===0 ? ctx_c.moveTo(scaleX(i), scaleY(c.ema10)) : ctx_c.lineTo(scaleX(i), scaleY(c.ema10));
  });
  ctx_c.stroke();

  // Velas
  const bw = Math.max(2, cw/chartData.length - 1);
  chartData.forEach((c,i) => {
    const x  = scaleX(i);
    const yo = scaleY(c.open);
    const yc = scaleY(c.close);
    const yh = scaleY(c.high);
    const yl = scaleY(c.low);
    const bull = c.close >= c.open;
    ctx_c.strokeStyle = bull ? '#34d399' : '#f87171';
    ctx_c.fillStyle   = bull ? '#34d39966' : '#f8717166';
    ctx_c.lineWidth = 1;
    ctx_c.beginPath(); ctx_c.moveTo(x, yh); ctx_c.lineTo(x, yl); ctx_c.stroke();
    ctx_c.fillRect(x - bw/2, Math.min(yo,yc), bw, Math.abs(yo-yc)||1);
    ctx_c.strokeRect(x - bw/2, Math.min(yo,yc), bw, Math.abs(yo-yc)||1);
  });

  // Marcadores de señales
  signals.forEach((s, idx) => {
    const ci = chartData.findIndex(c => c.dt_col.startsWith(s.fecha) && c.dt_col.includes(s.hora_col));
    if (ci < 0) return;
    const x = scaleX(ci);
    const y = scaleY(s.price);
    const isBear = s.direction === 'BEARISH';
    const isActive = idx === highlightIdx;

    // Línea vertical
    ctx_c.strokeStyle = isBear ? '#f8717144' : '#34d39944';
    ctx_c.lineWidth = isActive ? 2 : 1;
    ctx_c.setLineDash([4,4]);
    ctx_c.beginPath(); ctx_c.moveTo(x, pad.top); ctx_c.lineTo(x, H-pad.bottom); ctx_c.stroke();
    ctx_c.setLineDash([]);

    // Flecha
    const arrowSize = isActive ? 12 : 9;
    ctx_c.fillStyle = isBear ? (isActive?'#ef4444':'#f87171') : (isActive?'#10b981':'#34d399');
    ctx_c.beginPath();
    if (isBear) {
      ctx_c.moveTo(x, y + arrowSize*2);
      ctx_c.lineTo(x - arrowSize, y);
      ctx_c.lineTo(x + arrowSize, y);
    } else {
      ctx_c.moveTo(x, y - arrowSize*2);
      ctx_c.lineTo(x - arrowSize, y);
      ctx_c.lineTo(x + arrowSize, y);
    }
    ctx_c.closePath(); ctx_c.fill();

    // Label
    ctx_c.fillStyle = '#fff';
    ctx_c.font = `bold ${isActive?11:10}px Inter`;
    ctx_c.textAlign = 'center';
    ctx_c.fillText(`#${idx+1}`, x, isBear ? y + arrowSize*2 + 12 : y - arrowSize*2 - 4);

    // Strikes
    const parts = s.estrategia.split(' ');
    const strikes = parts[parts.length-1].split('/');
    if (strikes.length === 2) {
      [strikes[0], strikes[1]].forEach((sk, si) => {
        const ky = scaleY(parseFloat(sk));
        ctx_c.strokeStyle = isBear ? '#f8717133' : '#34d39933';
        ctx_c.lineWidth = 1;
        ctx_c.setLineDash([2,6]);
        ctx_c.beginPath(); ctx_c.moveTo(x-30, ky); ctx_c.lineTo(x+30, ky); ctx_c.stroke();
        ctx_c.setLineDash([]);
        ctx_c.fillStyle = isBear ? '#f87171' : '#34d399';
        ctx_c.font = '9px Inter'; ctx_c.textAlign='right';
        ctx_c.fillText(sk, x+28, ky-2);
      });
    }
  });

  // Eje X — fechas
  ctx_c.fillStyle = '#4b5563'; ctx_c.font='10px Inter'; ctx_c.textAlign='center';
  const step = Math.ceil(chartData.length / 8);
  chartData.forEach((c,i) => {
    if (i % step === 0) {
      ctx_c.fillText(c.dt_col.slice(5,10), scaleX(i), H-pad.bottom+14);
    }
  });
}

// ── BACKTEST LOGIC ─────────────────────────────────────────────
function runBacktest() {
  const from     = document.getElementById('dateFrom').value;
  const to       = document.getElementById('dateTo').value;
  const minScore = parseInt(document.getElementById('minScore').value) || 75;

  // Filtrar datos por rango
  chartData = SPX_CHART_DATA.filter(c => {
    const d = c.dt_col.slice(0,10);
    return d >= from && d <= to;
  });

  // Recalcular señales sobre datos filtrados
  signals = [];
  let prevDir = null;
  const closes = chartData.map(c => c.close);

  chartData.forEach((c, i) => {
    if (i < 25) return;
    const e10 = c.ema10, e20 = c.ema20, mh = c.macdH, ml = c.macdL;
    if (!e10 || !e20 || mh == null) return;

    // Solo horario mercado
    const h = parseInt(c.dt_col.slice(11,13));
    if (h < 9 || h > 14) return;

    const evalDir = (dir) => {
      const isBear = dir === 'BEARISH';
      const cr = {
        precio_ema200:        false,
        emas_alineadas_diario:false,
        emas_alineadas_15m:   isBear ? (e10 < e20) : (e10 > e20),
        macd_alineado_15m:    isBear ? (ml < 0 || mh < 0) : (ml > 0 || mh > 0),
        precio_cerca_ema:     Math.abs(c.close - e10)/c.close*100 < 0.5,
        volumen_spy:          true,
        gex_compatible:       true,
      };
      const score = Object.keys(cr).reduce((acc,k) => acc + (cr[k] ? WEIGHTS[k].w : 0), 0);
      return { score, criterios: cr };
    };

    const bear = evalDir('BEARISH');
    const bull = evalDir('BULLISH');

    let dir = null, score = 0, criterios = {};
    if (bear.score >= minScore && bear.score >= bull.score) {
      dir='BEARISH'; score=bear.score; criterios=bear.criterios;
    } else if (bull.score >= minScore) {
      dir='BULLISH'; score=bull.score; criterios=bull.criterios;
    }
    if (!dir || dir === prevDir) return;
    prevDir = dir;

    const isBear = dir === 'BEARISH';
    const shortS = Math.round(c.close/5)*5 + (isBear?75:-75);
    const longS  = isBear ? shortS+20 : shortS-20;

    // Black-Scholes prima estimada
    const T = 4/(252*6.5);
    const iv = 0.175;
    const r  = 0.045;
    const bsCall = (S,K) => {
      if (T<=0) return Math.max(S-K,0);
      const erf = x => { const t=1/(1+.3275911*Math.abs(x)); const y=1-t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))))*Math.exp(-x*x); return x>=0?y:-y; };
      const d1=(Math.log(S/K)+(r+.5*iv*iv)*T)/(iv*Math.sqrt(T));
      const d2=d1-iv*Math.sqrt(T);
      const N=x=>(1+erf(x/Math.sqrt(2)))/2;
      return S*N(d1)-K*Math.exp(-r*T)*N(d2);
    };
    const shortP = bsCall(c.close, shortS);
    const longP  = bsCall(c.close, longS);
    const credito = Math.max(0, (isBear ? shortP-longP : longP-shortP));
    const riesgo  = 20 - credito;

    signals.push({
      fecha: c.dt_col.slice(0,10),
      hora_col: c.dt_col.slice(11,16),
      direction: dir,
      price: c.close,
      ema10: e10, ema20: e20,
      macd_hist: mh, macd_line: ml,
      score, criterios,
      estrategia: `${isBear?'Bear Call':'Bull Put'} ${shortS}/${longS}`,
      shortStrike: shortS, longStrike: longS,
      credito: +credito.toFixed(2),
      riesgo: +riesgo.toFixed(2),
      breakeven: isBear ? shortS+credito : shortS-credito,
    });
  });

  // Actualizar stats
  document.getElementById('stat-total').textContent = signals.length;
  document.getElementById('stat-bear').textContent  = signals.filter(s=>s.direction==='BEARISH').length;
  document.getElementById('stat-bull').textContent  = signals.filter(s=>s.direction==='BULLISH').length;

  // Render lista
  const list = document.getElementById('signalList');
  if (!signals.length) {
    list.innerHTML = '<div class="no-signal">Sin señales en este período</div>';
    document.getElementById('detailPanel').style.display='none';
    resizeCanvas(); return;
  }

  list.innerHTML = signals.map((s,i) => `
    <div class="signal-card ${s.direction==='BEARISH'?'bearish':'bullish'}" onclick="showDetail(${i})">
      <div class="sc-header">
        <span class="sc-dir ${s.direction==='BEARISH'?'bear':'bull'}">${s.direction==='BEARISH'?'🐻 BEARISH':'🐂 BULLISH'}</span>
        <span class="sc-score">⚡ ${s.score}%</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span class="sc-fecha">${s.fecha}</span>
        <span class="sc-hora">${s.hora_col} COL</span>
      </div>
      <div class="sc-price">SPX: $${s.price.toLocaleString()}</div>
      <div class="sc-estrategia">${s.estrategia}</div>
    </div>
  `).join('');

  drawChart();
}

function showDetail(idx) {
  activeIdx = idx;
  const s = signals[idx];
  const isBear = s.direction === 'BEARISH';

  // Activar card
  document.querySelectorAll('.signal-card').forEach((el,i) => el.classList.toggle('active', i===idx));

  // Detalle
  document.getElementById('detailPanel').style.display='block';
  document.getElementById('detailTitle').textContent = `#${idx+1} — ${s.estrategia}`;

  const grid = document.getElementById('detailGrid');
  const be = (s.breakeven||0).toFixed(1);
  const ret = s.riesgo > 0 ? ((s.credito/s.riesgo)*100).toFixed(1) : '—';
  grid.innerHTML = `
    <div class="detail-item"><div class="label">Estrategia</div><div class="value blue">${s.estrategia}</div></div>
    <div class="detail-item"><div class="label">SPX entrada</div><div class="value">$${s.price.toLocaleString()}</div></div>
    <div class="detail-item"><div class="label">Crédito neto</div><div class="value green">$${(s.credito*100).toFixed(0)}</div></div>
    <div class="detail-item"><div class="label">Riesgo máx</div><div class="value red">$${(s.riesgo*100).toFixed(0)}</div></div>
    <div class="detail-item"><div class="label">Breakeven</div><div class="value yellow">${be}</div></div>
    <div class="detail-item"><div class="label">Retorno/riesgo</div><div class="value">${ret}%</div></div>
    <div class="detail-item"><div class="label">Score Playbook</div><div class="value yellow">⚡ ${s.score}%</div></div>
    <div class="detail-item"><div class="label">Colateral</div><div class="value">$2,000</div></div>
  `;

  // Barras Playbook
  const bars = document.getElementById('playbookBars');
  bars.innerHTML = '<div style="font-size:11px;color:#64748b;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Playbook Score</div>' +
    Object.keys(WEIGHTS).map(k => {
      const ok = s.criterios && s.criterios[k];
      const w  = WEIGHTS[k].w;
      const pct = (w/28)*100;
      return `
        <div class="pb-row">
          <div class="pb-label">${ok?'✅':'❌'} ${WEIGHTS[k].label}</div>
          <div class="pb-bar-bg"><div class="pb-bar" style="width:${ok?pct:0}%;background:${ok?'#3b82f6':'#374151'}"></div></div>
          <div class="pb-pts">${ok?w:0}</div>
        </div>`;
    }).join('');

  drawChart(idx);
}

// Init
window.addEventListener('resize', resizeCanvas);
setTimeout(() => {
  resizeCanvas();
  runBacktest();
}, 100);
</script>
